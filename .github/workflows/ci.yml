name: CI

on:
  push:
    branches: [main, improvements]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint tools
        run: pip install flake8
      - name: Lint src
        run: flake8 src/ --max-line-length=100 --extend-ignore=E203,W503

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libxcb-cursor0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-qt

      - name: Run tests
        run: |
          # 只跑 core 模块的测试（跳过 GUI 测试，因为无显示器）
          python -m pytest src/video_frame_capture/tests/ -v -k "not gui" --ignore-glob='*gui*'
